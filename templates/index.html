
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Spotify</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
    <style>
        /* --- ESTILOS PARA LOS CAMPOS DINÁMICOS --- */
        .btn-dinamico {
            padding: 0 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #1DB954; /* Verde Spotify */
            color: white;
            transition: 0.2s;
            height: 40px; /* Para alinearlo bien con tus inputs */
        }
        .btn-dinamico:hover {
            background-color: #1ed760;
        }
        .btn-remover {
            background-color: #e74c3c;
        }
        .btn-remover:hover {
            background-color: #c0392b;
        }
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .input-row input {
            flex: 1;
            margin-bottom: 0; /* Sobrescribe el margin inferior para alinearse con el botón */
        }
    </style>
</head>
<body class="spotify-app">
    <header class="spotify-header">
        <h1>Gestor de Playlists</h1>
        <p>Hola, <strong style="color:#1db954">{{ usuario_actual }}</strong> | <a href="/logout" style="color:#fff">Salir</a></p>
        
        <div style="margin-top: 15px;">
            <a href="/conectar-spotify" class="upload-btn" style="background:#1db954; text-decoration:none; padding: 10px 20px; border-radius: 20px; display:inline-block; color: white;">
                🟢 Conectar con Spotify
            </a>
        </div>
    </header>
    <main class="imagenes-main">
        <div class="formularios-container">
            <div class="upload-form">
                <label style="color:white; font-size: 0.9rem; margin-bottom: 5px;">Idioma de la Playlist:</label>
                <select id="lang-select" class="input-artista" style="margin-bottom: 20px;">
                    <option value="es">Español</option>
                    <option value="en">Inglés</option>
                </select>

                <form onsubmit="crearUno(event)">
                    <h2>Individual</h2>
                    <input type="text" id="art-1" name="artista_individual" class="input-artista" placeholder="Cantante" required>
                    <button type="submit" class="upload-btn" id="b1">Crear Lista</button>
                </form>
                
                <hr style="width:100%; border:0; border-top:1px solid #333; margin:2rem 0">
                
                <form onsubmit="crearVarios(event)">
                    <h2>Masivo</h2>
                    <textarea id="art-m" name="artistas_masivos" rows="4" class="input-artista" placeholder="Cantantes separados por coma..."></textarea>
                    <button type="submit" class="upload-btn" id="bm">Crear Múltiples</button>
                </form>

                <hr style="width:100%; border:0; border-top:1px solid #333; margin:2rem 0">

                <!-- NUEVA SECCIÓN: CANCIONES EXTRAS -->
                <div class="form-section">
                    <h2>Canciones Extras</h2>
                    <p style="color: #aaa; font-size: 0.8rem; margin-bottom: 10px;">Se añadirán a las listas Individuales y Masivas</p>
                    <div id="contenedor-extras">
                        <div class="input-row">
                            <input type="text" id="extra_fijo" name="cancion_extra_id" class="input-artista" placeholder="ID de la canción (Opcional)">
                            <button type="button" class="btn-dinamico" onclick="agregarCampoExtra()">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <form class="upload-form" onsubmit="subirImg(event)">
                <h2>Subir Portada</h2>
                <input type="text" id="art-img" class="input-artista" placeholder="Nombre del Artista" required>
                <input type="file" id="file-img" class="input-file" required>
                <button type="submit" class="upload-btn">Guardar</button>
            </form>
        </div>
    </main>

   <script>
       // --- FUNCIÓN PARA RECOPILAR LAS CANCIONES EXTRAS AL ENVIAR ---
       function obtenerExtrasActuales() {
           const inputs = document.querySelectorAll('input[name="cancion_extra_id"]');
           return Array.from(inputs)
                       .map(input => input.value.trim())
                       .filter(val => val !== ""); // Solo devolvemos los que no estén vacíos
       }

       async function crearUno(e) {
           e.preventDefault();
           const btn = document.getElementById('b1');
           btn.innerText = "Creando...";
           btn.disabled = true;

           const val = document.getElementById('art-1').value;
           const lang = document.getElementById('lang-select').value;
           const extras = obtenerExtrasActuales(); // Capturamos los tracks extra
           
           try {
               const res = await fetch('/api/crear_playlist', {
                   method: 'POST',
                   headers: {'Content-Type': 'application/json'},
                   body: JSON.stringify({
                       artist_name: val, 
                       language: lang,
                       id_extra: extras // Enviamos los extras al backend
                   })
               });
               const data = await res.json();
               
               if (data[0] && data[0].status === 'auth_required') {
                   alert("Primero debes hacer clic en el botón verde 'Conectar con Spotify' arriba.");
               } else if (data[0] && data[0].status === 'error') {
                   alert("Error de Spotify: " + data[0].message); 
               } else if (data[0] && data[0].status === 'success') {
                   alert('¡Playlist creada con éxito!');
                   document.getElementById('art-1').value = ""; // Limpiamos el input individual
                   localStorage.removeItem('borrador_artista_individual');
               } else {
                   alert('Error desconocido al crear la playlist.');
               }
           } catch (err) {
               alert("Error de conexión con el servidor.");
           } finally {
               btn.innerText = "Crear Lista";
               btn.disabled = false;
           }
       }

       async function crearVarios(e) {
           e.preventDefault();
           const btn = document.getElementById('bm');
           btn.innerText = "Procesando...";
           btn.disabled = true;

           const val = document.getElementById('art-m').value;
           const lang = document.getElementById('lang-select').value;
           const extras = obtenerExtrasActuales(); // Capturamos los tracks extra
           
           try {
               const res = await fetch('/api/crear_listas_json', {
                   method: 'POST',
                   headers: {'Content-Type': 'application/json'},
                   body: JSON.stringify({
                       nombres: val, 
                       language: lang,
                       id_extra: extras // Enviamos los extras al backend
                   })
               });
               const data = await res.json();
               alert('¡Lote procesado! Revisa tu Spotify.');
               document.getElementById('art-m').value = ""; // Limpiamos el textarea masivo
               localStorage.removeItem('borrador_artistas_masivos');
           } catch (err) {
               alert("Error procesando el lote.");
           } finally {
               btn.innerText = "Crear Múltiples";
               btn.disabled = false;
           }
       }

       async function subirImg(e) {
           e.preventDefault();
           const f = new FormData();
           f.append("file", document.getElementById('file-img').files[0]);
           f.append("artista", document.getElementById('art-img').value);
           await fetch('/api/upload_image', {method: 'POST', body: f});
           alert('Imagen guardada');
       }

       // ====================================================================
       // SISTEMA DE CAMPOS DINÁMICOS Y AUTOGUARDADO
       // ====================================================================

       function agregarCampoExtra(valorInicial = "") {
           const contenedor = document.getElementById("contenedor-extras");
           
           const nuevaFila = document.createElement("div");
           nuevaFila.className = "input-row";
           
           const nuevoInput = document.createElement("input");
           nuevoInput.type = "text";
           nuevoInput.name = "cancion_extra_id"; 
           nuevoInput.className = "input-artista"; // Hereda tus estilos base
           nuevoInput.placeholder = "ID de la canción (Opcional)";
           nuevoInput.value = valorInicial;
           
           nuevoInput.addEventListener('input', guardarExtras);
           
           const btnRemover = document.createElement("button");
           btnRemover.type = "button";
           btnRemover.className = "btn-dinamico btn-remover";
           btnRemover.innerText = "-";
           btnRemover.onclick = function() {
               contenedor.removeChild(nuevaFila);
               guardarExtras();
           };
           
           nuevaFila.appendChild(nuevoInput);
           nuevaFila.appendChild(btnRemover);
           contenedor.appendChild(nuevaFila);
       }

       function guardarExtras() {
           const inputs = document.querySelectorAll('input[name="cancion_extra_id"]');
           const valores = Array.from(inputs).map(input => input.value);
           localStorage.setItem('extras_bloqueados', JSON.stringify(valores));
       }

       document.addEventListener("DOMContentLoaded", function() {
           
           // 1. Cargar autoguardado de campos normales
           const camposEstandar = document.querySelectorAll('input[name="artista_individual"], textarea[name="artistas_masivos"]');
           camposEstandar.forEach(campo => {
               const valorGuardado = localStorage.getItem('borrador_' + campo.name);
               if (valorGuardado !== null) {
                   campo.value = valorGuardado;
               }
               campo.addEventListener('input', function() {
                   localStorage.setItem('borrador_' + campo.name, campo.value);
               });
           });

           // 2. Cargar los IDs Extras Guardados en Memoria
           const inputFijo = document.getElementById('extra_fijo');
           inputFijo.addEventListener('input', guardarExtras);

           const extrasGuardados = JSON.parse(localStorage.getItem('extras_bloqueados') || "[]");
           
           if (extrasGuardados.length > 0) {
               inputFijo.value = extrasGuardados[0];
               
               for (let i = 1; i < extrasGuardados.length; i++) {
                   agregarCampoExtra(extrasGuardados[i]);
               }
           }
       });
   </script>
</body>
</html>
