<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | Creador de Listas</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <style>
        .btn-volver {
            background-color: transparent;
            color: #b3b3b3;
            border: 1px solid #444;
            margin-top: 15px;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        .btn-volver:hover {
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body class="login-body">
    
    <div class="login-box">
        <h2>Registro de Usuario</h2>
        
        <!-- CORRECCIÓN: Mostrar un texto real en lugar del número 1 -->
        {% if error == 1 %}
            <p style="color:#ff4d4d; text-align:center; font-size:14px;">El usuario ya existe. Intenta con otro.</p>
        {% endif %}
        
        <form action="/api/registro" method="POST">
            <input type="text" name="username" class="input-artista" placeholder="Crea un Usuario" required>
            <input type="password" name="password" class="input-artista" placeholder="Crea una Contraseña" required>
            
            <button type="submit" class="upload-btn">Registrar Usuario</button>
            
            <!-- CORRECCIÓN: La ruta correcta es /login, no /login-page -->
            <a href="/login" class="upload-btn btn-volver">Volver al Login</a>
        </form>
    </div>

</body>
</html>
