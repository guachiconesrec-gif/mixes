<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Spotify API</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body class="login-body">
    
    <div class="login-box">
        <h2>Spotify API 2.0</h2>
        {% if error == 1 %}<p style="color:red">Credenciales incorrectas</p>{% endif %}
        
        <form action="/api/login" method="POST">
            <input type="text" name="username" class="input-artista" placeholder="Usuario" required>
            <input type="password" name="password" class="input-artista" placeholder="Contraseña" required>
            <button type="submit" class="upload-btn">Entrar</button>
        </form>
    </div>

</body>
</html>
